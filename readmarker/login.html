<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/login.css">
  <title>Document</title>
</head>
<body>

  <main>
    <div class="login_container">
      <div class="title">Read Mark</div>

      <div class="sections">

      
      <section>
        <div>
          <div class="login_title">아이디</div>
          <div class="login_input-container">
            <div><img class="person" src="./img/login/Vector.svg" alt=""></div>
            <div class="login_input"><input type="text" placeholder="아이디 입력">
            </div>
          </div>
        </div>
      </section>

      <section>
        <div>
          <div class="login_title">비밀번호</div>
          <div class="login_input-container">
            <div><img class="pw" src="./img/login/mdi_password.svg" alt=""></div>
            <div class="login_input"><input type="password" placeholder="비밀번호 입력">
            </div>
          </div>
        </div>
      </section>

      </div>

      <div class="login_button-container">
        <div class="login_button"> <button>로그인</button></div>
      </div>

      <div class="bottom_container">
        <div class="front">계정이 없으신가요?</div>
        <div class="back"><a href="./join.html">회원가입</a></div>
      </div>
    </div>
  </main>

  
</body>
</html>
